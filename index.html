<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Movio — smart campus transport for FUTA. Real-time shuttle tracking and tap-to-board. Take the 3-minute student survey and help shape a final-year project — wherever you are."
    />
    <meta name="theme-color" content="#16a34a" />
    <title>Movio — Smart campus transport for FUTA</title>

    <!-- Production URL — update if the deployed domain changes. -->
    <link rel="canonical" href="https://movioapp.vercel.app/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, iMessage…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Movio" />
    <meta property="og:title" content="Help build Movio — the smart FUTA campus transportation system" />
    <meta
      property="og:description"
      content="Live shuttle tracking + tap-to-board for FUTA. Take the 3-minute survey — on campus or anywhere — and shape a final-year project. 100% anonymous."
    />
    <meta property="og:url" content="https://movioapp.vercel.app/" />
    <!-- Wide social card. Add a 1200×630 file at public/og.jpg (see
         docs/OG-IMAGE.md). Until it exists, previews fall back to the favicon. -->
    <meta property="og:image" content="https://movioapp.vercel.app/og.jpg" />
    <meta property="og:image:secure_url" content="https://movioapp.vercel.app/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Movio — live shuttle tracking and tap-to-board for the FUTA campus."
    />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Help build Movio — the smart FUTA campus transportation system" />
    <meta
      name="twitter:description"
      content="Live shuttle tracking + tap-to-board for FUTA. Take the 3-minute survey — on campus or anywhere — and shape a final-year project."
    />
    <meta name="twitter:image" content="https://movioapp.vercel.app/og.jpg" />
    <meta
      name="twitter:image:alt"
      content="Movio — live shuttle tracking and tap-to-board for the FUTA campus."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
